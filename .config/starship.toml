[username]
show_always = true
format = '[$user]($style)[@](green)'
style_user = 'bold green'

[hostname]
ssh_only = false
format = '[$ssh_symbol$hostname]($style):'
style = 'bold green'

[directory]
truncation_length = 10
truncate_to_repo = false
before_repo_root_style = 'blue'
repo_root_style = 'bold cyan'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_status]
ahead = '>'
behind = '<'
diverged = '<>'
modified = '*'
typechanged = '!'
up_to_date = "="
conflicted = "|CONFLICT"

[character]
success_symbol = '[\$](bold green)'
error_symbol = '[\$](bold red)'

[time]
disabled = false
format = '[$time]($style) '

[custom.screen]
command = "echo '(SCREEN)'"
when = '[[ -n "$STY" ]]' # STY がセットされているときだけ表示
style = "bold red"

[gcloud]
# gcloud コマンドは空の default configuration でも on ☁ が出る
# 以下のコマンドで明示的に有効・無効を切り替える運用を試す
#
# export STARSHIP_GCLOUD=1
# unset STARSHIP_GCLOUD
detect_env_vars = ["STARSHIP_GCLOUD"]
format = 'on [$symbol$project $account(@$domain)(\($region\))]($style) '

